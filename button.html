<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
</head>
<body>
    <style>
        .subscribe-button {
            background-color: red;
            color: white;
            border: none;
            height: 60px;
            width: 100px;
            border-radius: 3px;
            cursor: pointer;
            padding-top: 5px;
            padding-bottom: 5px;
        }
        .join-button {
            background-color: white;
            color: blue;
            border-color: rgb(0, 145, 255);
            border-width: 1px;
            border-radius: 2px;
            padding-bottom: 5px;
            padding-top: 5px;
            margin-left: 7px;
            margin-right: 5px;
            width: 60px;
            cursor: pointer;
            transition: background-color 1s;
            box-shadow: 10px 10px 10px green;

        }
        .join-button:hover {
            background-color: green;

        }
        .join-button:active {
            background-color: blueviolet;
        }
    
        .tweet-button {
            background-color: rgb(0, 195, 255);
            color: white;
            border: none;
            height: 30px;
            border-radius: 15px;
            padding-left: 10px;
            padding-right: 10px;
            cursor: pointer;
            box-shadow: 10px 10px 10px red;
            
            
            
        }
        .tweet-button:hover {
            background-color: red;
        }
    </style>

    <button class="Subcribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">TWEET</button>


    
</body>
</html>
